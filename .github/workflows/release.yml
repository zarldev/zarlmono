name: release

# Publishes versioned zarlcode binaries after a `zarlcode/vX.Y.Z` tag is pushed.
# The canonical operator entrypoint is `.github/workflows/release-dispatch.yml`,
# which validates inputs and pushes the release tags. This workflow remains the
# downstream tag-driven publisher for zarlcode assets, checksums, and Homebrew.
#
# zarlcode is its own Go module (github.com/zarldev/zarlmono/zarlcode), so it is
# versioned with submodule-prefixed tags `zarlcode/vX.Y.Z`. The build strips the
# `zarlcode/` prefix for the binary version and archive names.
#
# The archive name is the contract `zarlcode upgrade` relies on:
#   zarlcode_<version>_<goos>_<goarch>.tar.gz   (unix)
# using raw GOOS/GOARCH so the client matcher needs no os/arch translation.
on:
  push:
    tags: ["zarlcode/v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # zarlcode is pure Go (it lives in the non-CGO CI matrix), so every target
      # cross-compiles from this one linux runner with CGO disabled.
      - name: build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#zarlcode/}"   # zarlcode/v1.2.3 -> v1.2.3
          ldflags="-s -w -X github.com/zarldev/zarlmono/zarlcode/version.version=${VERSION}"
          bin="zarlcode"
          mkdir -p dist
          go build -trimpath -ldflags "${ldflags}" -o "dist/${bin}" ./zarlcode/cmd

          base="zarlcode_${VERSION}_${GOOS}_${GOARCH}"
          archive="${base}.tar.gz"
          tar -czf "dist/${archive}" "dist/${bin}"
          ( cd dist && sha256sum "${archive}" > "${archive}.sha256" )
          echo "packaged dist/${archive}"
      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zarlcode-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    env:
      HOMEBREW_APP_ID: ${{ secrets.HOMEBREW_APP_ID }}
      HOMEBREW_APP_PRIVATE_KEY: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Aggregate the per-target sha256 lines into a single checksums.txt that
      # the upgrade client downloads to verify whichever archive it pulled.
      - name: assemble checksums
        run: |
          set -euo pipefail
          cd artifacts
          cat *.sha256 > checksums.txt
          rm -f *.sha256
          echo "release assets:"
          ls -1

      - name: publish github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # The release keeps the full submodule tag; the title is the bare version.
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "zarlcode ${TAG#zarlcode/}" \
            --generate-notes \
            artifacts/*

      - name: generate homebrew formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 scripts/generate_homebrew_formula.py \
            --version "${TAG#zarlcode/}" \
            --checksums artifacts/checksums.txt \
            --output homebrew/zarlcode.rb

      - name: create homebrew tap app token
        id: homebrew-app-token
        if: ${{ env.HOMEBREW_APP_ID != '' && env.HOMEBREW_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: zarldev
          repositories: homebrew-tap
      - name: update homebrew tap
        if: ${{ steps.homebrew-app-token.outputs.token != '' }}
        env:
          HOMEBREW_TAP_APP_TOKEN: ${{ steps.homebrew-app-token.outputs.token }}
        run: |
          set -euo pipefail
          repo_url="https://x-access-token:${HOMEBREW_TAP_APP_TOKEN}@github.com/zarldev/homebrew-tap.git"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          git clone "$repo_url" "$tmpdir"
          mkdir -p "$tmpdir/Formula"
          cp homebrew/zarlcode.rb "$tmpdir/Formula/zarlcode.rb"
          if git -C "$tmpdir" diff --quiet -- Formula/zarlcode.rb; then
            echo "homebrew tap already up to date"
            exit 0
          fi
          git -C "$tmpdir" config user.name "github-actions[bot]"
          git -C "$tmpdir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tmpdir" add Formula/zarlcode.rb
          git -C "$tmpdir" commit -m "zarlcode ${GITHUB_REF_NAME#zarlcode/}"
          git -C "$tmpdir" push